# vim:fileencoding=utf-8:foldmethod=marker

## Window
window_padding_width 0 0 0
macos_titlebar_color background
active_border_color none
inactive_border_color #555

## Font Family
font_family      Operator Mono Lig Book
bold_font        Operator Mono Lig Medium
italic_font      Operator Mono Lig Book Italic
bold_italic_font Operator Mono Medium Lig Italic

font_size 16
adjust_line_height 8
# adjust_column_width 0
# adjust_baseline 0

