[battery]
full_symbol = "🔋"
charging_symbol = "🔌"
discharging_symbol = "⚡"

[[battery.display]]
threshold = 30
style = "bold red" 

[character]
success_symbol = "[λ](green)"
error_symbol = "[λ](bold red)"

[directory]
truncation_length = 5
format = "[$path]($style)[$lock_symbol]($lock_style) "
style = "bold orange"
read_only = "🔒"
read_only_style= "bold white"

[git_branch]
symbol = "🌱 "

[git_commit]
commit_hash_length = 8
tag_symbol = "🔖 "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[🍒 PICKING](bold red)"

[git_status]
conflicted = "🏳"
ahead = "⇡${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"
untracked = "🤷‍"
stashed = "📦"
modified = "📝"
staged = '[++\($count\)](green)'
renamed = "👅"
deleted = "🗑"

[hostname]
ssh_only = true
format = "<[$hostname]($style)>"
trim_at = "-"
style = "bold orange"
disabled = true

[time]
disabled = false
format = '[\[ $time \]]($style) '
time_format = "%R"

[package]
disabled = true

[python]
format = "[$symbol$version]($style) "
style = "bold blue"
symbol = "🐍"
pyenv_version_name = true
